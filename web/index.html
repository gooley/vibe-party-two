<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Judge Tournament</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Photo Judge Tournament</h1>
            <p>AI-powered photo tournament with progressive filtering</p>
        </header>

        <div class="controls">
            <div class="tournament-controls">
                <button id="runTournament" class="btn btn-primary">Run Tournament</button>
                <button id="refreshData" class="btn btn-secondary">Refresh Data</button>
                <span id="status" class="status"></span>
            </div>

            <div class="round-slider">
                <label for="roundSlider">Tournament Round:</label>
                <input type="range" id="roundSlider" min="0" max="0" value="0" step="1">
                <div class="slider-labels">
                    <span id="sliderLabel">Round 0 (All Photos)</span>
                    <span id="photoCount">0 photos</span>
                </div>
            </div>
        </div>

        <div class="tournament-info">
            <div class="info-card">
                <h3>Tournament Status</h3>
                <div id="tournamentStatus">Loading...</div>
            </div>
            <div class="info-card">
                <h3>Current Round</h3>
                <div id="currentRound">-</div>
            </div>
            <div class="info-card">
                <h3>Active Photos</h3>
                <div id="activePhotos">-</div>
            </div>
        </div>

        <div id="photoGrid" class="photo-grid">
            <!-- Photos will be dynamically loaded here -->
        </div>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Loading...</p>
        </div>
    </div>

    <script src="/script.js"></script>
</body>
</html>
